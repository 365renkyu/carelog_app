name: ikuji_kiroku_app
description: 子供の日々の記録をつけて振り返るアプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # データ保存
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # イミュータブルモデル
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0      # 将来のグラフ機能用（睡眠以外）
  cupertino_icons: ^1.0.6

  # ユーティリティ
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3  # エクスポートフィールド設定の永続化

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
